name: ci_quality_group
description: "App interna de CI Quality Group: control de ventas y horas laboradas."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.18.0
  timezone: ^0.9.4

  # Excel export
  excel: ^4.0.6

  # File / share
  path_provider: ^2.1.5
  share_plus: ^10.1.2

  # Persistencia local (preferencia de tema)
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/seed/

  # La tipografía Inter se descarga en runtime vía google_fonts, así no se
  # necesita guardar los .ttf en el repo. Si en el futuro quieres bundlearlos
  # para arranque en frío sin red, descárgalos de https://rsms.me/inter/ y
  # vuelve a declarar la sección `fonts:` aquí.
